<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 我的书单 - 深度阅读 · 终身学习</title>
<style>
:root {
  --bg: #0f0f0f;
  --s: #1a1a1a;
  --s2: #242424;
  --s3: #2a2a2a;
  --t: #e8e6e3;
  --t2: #9a9a9a;
  --t3: #6b6b6b;
  --a: #e8a838;
  --a2: #c4882a;
  --a-hover: #f0c060;
  --b: #2a2a2a;
  --r: 12px;
  --max: 1200px;
  --shadow: 0 4px 20px rgba(0,0,0,0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--t);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* Hero Section */
.hero {
  position: relative;
  padding: 100px 20px 80px;
  text-align: center;
  overflow: hidden;
  max-width: var(--max);
  margin: 0 auto;
}

.hero::before {
  content: '';
  position: absolute;
  top: -50%;
  left: 50%;
  transform: translateX(-50%);
  width: 800px;
  height: 800px;
  background: radial-gradient(circle, rgba(232,168,56,.1) 0%, transparent 70%);
  pointer-events: none;
  z-index: -1;
}

.hero h1 {
  font-size: clamp(2.5rem, 6vw, 4rem);
  font-weight: 800;
  margin-bottom: 16px;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, var(--a), #f0c060);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero .subtitle {
  font-size: 1.2rem;
  color: var(--t2);
  margin-bottom: 24px;
  font-style: italic;
}

.hero .description {
  font-size: 1rem;
  color: var(--t2);
  margin-bottom: 32px;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.8;
}

.badges {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 20px;
  border-radius: 24px;
  font-size: 0.9rem;
  font-weight: 600;
  border: 1px solid transparent;
}

.bc {
  background: rgba(232,168,56,.15);
  color: var(--a);
  border-color: rgba(232,168,56,.3);
}

.bg {
  background: rgba(100,200,140,.12);
  color: #7dcea0;
  border-color: rgba(100,200,140,.3);
}

.stats {
  display: flex;
  justify-content: center;
  gap: 48px;
  flex-wrap: wrap;
  margin-top: 20px;
}

.stat-item {
  text-align: center;
}

.stat-number {
  font-size: 2.5rem;
  font-weight: 800;
  color: var(--a);
  display: block;
  margin-bottom: 4px;
}

.stat-label {
  font-size: 0.9rem;
  color: var(--t2);
  font-weight: 500;
}

/* Navigation */
nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(15,15,15,.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--b);
  padding: 16px 20px;
}

.nav-container {
  max-width: var(--max);
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 16px;
  overflow-x: auto;
  scrollbar-width: none;
}

.nav-container::-webkit-scrollbar {
  display: none;
}

.nav-button {
  flex-shrink: 0;
  padding: 12px 24px;
  border-radius: 25px;
  border: 1px solid var(--b);
  background: transparent;
  color: var(--t2);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}

.nav-button::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(232,168,56,.1), transparent);
  transition: left 0.5s;
}

.nav-button:hover::before {
  left: 100%;
}

.nav-button:hover {
  border-color: var(--a2);
  color: var(--t);
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}

.nav-button.active {
  background: linear-gradient(135deg, var(--a), var(--a2));
  color: #000;
  border-color: var(--a);
  font-weight: 700;
  box-shadow: 0 4px 15px rgba(232,168,56,.3);
}

/* Search Bar */
.search-wrapper {
  max-width: var(--max);
  margin: 32px auto 0;
  padding: 0 20px;
}

.search-bar {
  width: 100%;
  padding: 16px 24px;
  border-radius: 30px;
  border: 2px solid var(--b);
  background: var(--s);
  color: var(--t);
  font-size: 1.1rem;
  outline: none;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: var(--shadow);
}

.search-bar::placeholder {
  color: var(--t2);
  opacity: 0.8;
}

.search-bar:focus {
  border-color: var(--a);
  box-shadow: 0 0 0 3px rgba(232,168,56,.2), var(--shadow);
  transform: translateY(-1px);
}

/* Content Wrapper */
.content-wrapper {
  max-width: var(--max);
  margin: 0 auto;
  padding: 0 20px;
}

.section {
  margin-bottom: 64px;
  animation: fadeInUp 0.6s ease-out;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.section-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 16px;
}

.section-title {
  font-size: 2rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--a), #f0c060);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.01em;
}

.section-count {
  font-size: 0.9rem;
  color: var(--t2);
  background: var(--s2);
  padding: 6px 16px;
  border-radius: 20px;
  font-weight: 600;
  border: 1px solid var(--b);
}

.section-description {
  color: var(--t2);
  font-size: 1.1rem;
  margin-bottom: 32px;
  line-height: 1.7;
}

/* Current Reading Cards */
.current-reading-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
  gap: 24px;
  margin-bottom: 48px;
}

.reading-card {
  padding: 32px;
  background: linear-gradient(135deg, var(--s) 0%, var(--s2) 100%);
  border-radius: var(--r);
  border: 2px solid var(--b);
  position: relative;
  overflow: hidden;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  cursor: pointer;
}

.reading-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 6px;
  height: 100%;
  background: linear-gradient(135deg, var(--a), var(--a2));
}

.reading-card:hover {
  border-color: var(--a);
  transform: translateY(-8px);
  box-shadow: 0 20px 40px rgba(232,168,56,.15);
}

.reading-card h3 {
  font-size: 1.4rem;
  font-weight: 700;
  margin-bottom: 12px;
  color: var(--t);
  letter-spacing: -0.01em;
}

.reading-card .author {
  color: var(--a2);
  font-size: 1rem;
  margin-bottom: 16px;
  font-weight: 600;
}

.reading-card .tag {
  display: inline-block;
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
  background: rgba(232,168,56,.15);
  color: var(--a);
  margin-bottom: 16px;
  border: 1px solid rgba(232,168,56,.3);
}

.reading-card .description {
  font-size: 1rem;
  color: var(--t2);
  line-height: 1.7;
  margin-bottom: 20px;
}

.reading-card .goal {
  font-size: 0.9rem;
  color: #7dcea0;
  font-weight: 600;
  padding: 8px 16px;
  background: rgba(125,206,160,.1);
  border-radius: 12px;
  border: 1px solid rgba(125,206,160,.2);
}

/* Category Overview */
.category-overview {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  margin-bottom: 48px;
}

.category-card {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 24px 28px;
  background: linear-gradient(135deg, var(--s) 0%, var(--s2) 100%);
  border-radius: var(--r);
  border: 2px solid var(--b);
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}

.category-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: linear-gradient(45deg, transparent, rgba(232,168,56,.05), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}

.category-card:hover::before {
  opacity: 1;
}

.category-card:hover {
  border-color: var(--a);
  transform: translateY(-6px);
  box-shadow: 0 15px 30px rgba(232,168,56,.15);
}

.category-info {
  z-index: 1;
}

.category-name {
  font-weight: 700;
  font-size: 1.1rem;
  color: var(--t);
  margin-bottom: 8px;
  letter-spacing: -0.01em;
}

.category-stats {
  font-size: 0.9rem;
  color: var(--t2);
  font-weight: 600;
}

.progress-container {
  width: 80px;
  height: 8px;
  background: var(--s3);
  border-radius: 4px;
  overflow: hidden;
  margin-top: 8px;
  z-index: 1;
}

.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--a), var(--a2));
  border-radius: 4px;
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}

.progress-bar::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.3), transparent);
  animation: shimmer 2s infinite;
}

@keyframes shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

/* Guide Cards */
.guide-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
  margin-bottom: 48px;
}

.guide-card {
  padding: 32px;
  background: linear-gradient(135deg, var(--s) 0%, var(--s2) 100%);
  border-radius: var(--r);
  border: 2px solid var(--b);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.guide-card:hover {
  border-color: var(--a);
  transform: translateY(-4px);
  box-shadow: 0 12px 25px rgba(232,168,56,.1);
}

.guide-card h3 {
  font-size: 1.3rem;
  font-weight: 700;
  margin-bottom: 20px;
  color: var(--a);
  letter-spacing: -0.01em;
}

.guide-card p {
  color: var(--t2);
  font-size: 1rem;
  line-height: 1.8;
  margin-bottom: 16px;
}

.guide-card ul {
  list-style: none;
  padding-left: 0;
}

.guide-card li {
  color: var(--t2);
  font-size: 0.95rem;
  margin-bottom: 12px;
  padding-left: 20px;
  position: relative;
}

.guide-card li::before {
  content: '•';
  color: var(--a);
  font-weight: bold;
  position: absolute;
  left: 0;
}

/* Book List */
.book-list {
  list-style: none;
  margin: 0;
}

.book-item {
  display: flex;
  gap: 20px;
  padding: 24px 32px;
  border-radius: var(--r);
  margin-bottom: 16px;
  background: linear-gradient(135deg, var(--s) 0%, var(--s2) 100%);
  border: 2px solid var(--b);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  cursor: default;
  position: relative;
  overflow: hidden;
}

.book-item::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 4px;
  height: 100%;
  background: linear-gradient(135deg, var(--a), var(--a2));
  opacity: 0.8;
}

.book-item:hover {
  border-color: rgba(232,168,56,.4);
  background: linear-gradient(135deg, var(--s2) 0%, var(--s3) 100%);
  transform: translateX(8px);
}

.book-rank {
  flex-shrink: 0;
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  background: var(--s3);
  color: var(--a);
  font-weight: 800;
  font-size: 1.1rem;
  border: 2px solid var(--b);
  transition: all 0.3s;
}

.book-rank.top-rank {
  background: linear-gradient(135deg, var(--a), var(--a2));
  color: #000;
  border-color: var(--a);
  box-shadow: 0 4px 15px rgba(232,168,56,.3);
}

.book-info {
  flex: 1;
  min-width: 0;
}

.book-title {
  font-size: 1.2rem;
  font-weight: 700;
  margin-bottom: 6px;
  color: var(--t);
  letter-spacing: -0.01em;
}

.book-author {
  color: var(--a2);
  font-size: 0.95rem;
  margin-bottom: 12px;
  font-weight: 600;
}

.book-description {
  color: var(--t2);
  font-size: 0.95rem;
  line-height: 1.7;
  margin-bottom: 0;
}

.book-link {
  color: var(--a);
  text-decoration: none;
  font-weight: 600;
  transition: all 0.2s;
  opacity: 0.8;
}

.book-link:hover {
  opacity: 1;
  text-shadow: 0 0 8px rgba(232,168,56,.5);
}

/* Footer */
.footer {
  text-align: center;
  padding: 60px 20px 40px;
  border-top: 2px solid var(--b);
  margin-top: 80px;
  background: linear-gradient(to top, rgba(26,26,26,.5), transparent);
}

.footer-content {
  max-width: var(--max);
  margin: 0 auto;
}

.footer-text {
  color: var(--t2);
  font-size: 1rem;
  margin-bottom: 20px;
  font-weight: 500;
}

.footer-link {
  color: var(--a);
  text-decoration: none;
  font-weight: 600;
  transition: all 0.3s;
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid transparent;
}

.footer-link:hover {
  background: rgba(232,168,56,.1);
  border-color: var(--a);
  transform: translateY(-2px);
  box-shadow: 0 4px 15px rgba(232,168,56,.2);
}

/* Empty State */
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--t2);
}

.empty-state-icon {
  font-size: 3rem;
  margin-bottom: 20px;
  opacity: 0.6;
}

.empty-state-text {
  font-size: 1.3rem;
  font-weight: 600;
  margin-bottom: 8px;
}

.empty-state-subtext {
  font-size: 1rem;
  opacity: 0.8;
}

/* Responsive Design */
@media (max-width: 768px) {
  .hero {
    padding: 80px 16px 60px;
  }

  .hero h1 {
    font-size: 2.2rem;
  }

  .hero .subtitle {
    font-size: 1.1rem;
  }

  .stats {
    gap: 32px;
  }

  .stat-number {
    font-size: 2rem;
  }

  .nav-button {
    padding: 10px 18px;
    font-size: 0.85rem;
  }

  .search-bar {
    padding: 14px 20px;
    font-size: 1rem;
  }

  .current-reading-grid,
  .category-overview,
  .guide-grid {
    grid-template-columns: 1fr;
  }

  .reading-card,
  .guide-card {
    padding: 24px;
  }

  .book-item {
    padding: 20px 24px;
    gap: 16px;
  }

  .book-rank {
    width: 40px;
    height: 40px;
    font-size: 1rem;
  }

  .section-title {
    font-size: 1.6rem;
  }
}

@media (max-width: 480px) {
  .hero {
    padding: 60px 12px 40px;
  }

  .badges {
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .badge {
    padding: 6px 16px;
    font-size: 0.8rem;
  }

  .stats {
    flex-direction: column;
    gap: 24px;
  }

  .nav-button {
    padding: 8px 14px;
    font-size: 0.8rem;
  }

  .category-card {
    padding: 20px 24px;
  }

  .book-title {
    font-size: 1.1rem;
  }

  .section {
    margin-bottom: 48px;
  }
}
</style>
</head>

  // Function to find the best matching note file for a book title
  function findNoteFile(bookTitle) {
    const cleanTitle = bookTitle.replace(/[《》]/g, '').trim();
    
    // Try exact pattern matches first
    for (const [pattern, fileName] of titlePatterns) {
      if (pattern.test(cleanTitle)) {
        return notesDir + fileName;
      }
    }
    
    // Try partial matches
    for (const [pattern, fileName] of titlePatterns) {
      if (cleanTitle.includes(pattern.source.replace(/\\/g, ''))) {
        return notesDir + fileName;
      }
    }
    
    // Fallback: try to match by removing common characters and searching
    const simplifiedTitle = cleanTitle
      .replace(/[，。！？、；：""''（）【】《》\s]/g, '')
      .replace(/[a-zA-Z]/g, '')
      .replace(/[\u4e00-\u9fa5]{2,}/g, match => match.slice(-2)); // Keep last 2 characters
    
    if (simplifiedTitle.length > 0) {
      // Return a generic note file as fallback
      return notesDir + "˼��������.html"; // Default thought process notes
    }
    
    return null;
  }

  // Build the navigation links object
  booksByCategory[1].concat(
    booksByCategory[2], booksByCategory[3], booksByCategory[4],
    booksByCategory[5], booksByCategory[6], booksByCategory[7],
    booksByCategory[8], booksByCategory[9]
  ).forEach(([title, author]) => {
    const link = findNoteFile(title);
    if (link) {
      navigationLinks[title] = link;
    }
  });

  return navigationLinks;
}

            <ul>
              <li><strong>需要解决问题</strong> → 实用技能类</li>
              <li><strong>追求自我成长</strong> → 认知成长类</li>
              <li><strong>理解社会运行</strong> → 历史社科类</li>
              <li><strong>把握科技趋势</strong> → 科技科普类</li>
              <li><strong>建立财富观念</strong> → 投资理财类</li>
            </ul>
          </div>

          <div class="guide-card">
            <h3>📅 按场景阅读</h3>
            <p>根据不同时间段安排阅读计划：</p>
            <ul>
              <li><strong>通勤碎片时间</strong>：认知成长、科技科普</li>
              <li><strong>周末深度阅读</strong>：历史社科、哲学宗教</li>
              <li><strong>工作学习间隙</strong>：实用技能、技术类</li>
              <li><strong>投资理财规划</strong>：投资理财、金融类</li>
            </ul>
          </div>

          <div class="guide-card">
            <h3>⭐ 精读建议</h3>
            <p>确保深度理解和实践应用：</p>
            <ul>
              <li><strong>每类前5本为核心必读</strong> - 建立基础框架</li>
              <li><strong>从最重要的开始</strong> - 优先阅读影响力最大的作品</li>
              <li><strong>深度内化而非读完</strong> - 真正的价值在于吸收和实践</li>
              <li><strong>建立知识连接</strong> - 将不同领域的知识有机整合</li>
            </ul>
          </div>
        </div>
      </section>`;
  }

  // Book sections for specific categories or all categories
  if (activeCategory === 'all') {
    categories.forEach(category => {
      const books = booksByCategory[category.id];
      const filteredBooks = searchQuery ?
        books.filter(book =>
          book[0].toLowerCase().includes(searchQuery) ||
          book[1].toLowerCase().includes(searchQuery) ||
          book[2].toLowerCase().includes(searchQuery)
        ) : books;

      if (filteredBooks.length > 0) {
        html += `
          <section class="section">
            <div class="section-header">
              <h2 class="section-title">${category.emoji} ${category.name}</h2>
              <span class="section-count">${filteredBooks.length}本</span>
            </div>
            <div class="section-description">${category.description}</div>
            <ul class="book-list">`;

        filteredBooks.forEach((book, index) => {
          const bookTitle = book[0];
          const bookLink = navigationLinks[bookTitle];
          const hasNote = !!bookLink;

          html += `
            <li class="book-item" ${hasNote ? 'style="cursor: pointer;" onclick="window.location.href=\'' + bookLink + '\'' : ''}>
              <div class="book-rank${index < 3 ? ' top-rank' : ''}">${index + 1}</div>
              <div class="book-info">
                <div class="book-title">${bookTitle}${hasNote ? `<a href="${bookLink}" class="book-link" target="_blank"> →</a>` : ''}</div>
                <div class="book-author">${book[1]}</div>
                <div class="book-description">${book[2]}</div>
              </div>
            </li>`;
        });

        html += '</ul></section>';
      }
    });
  } else if (activeCategory !== 'current' && activeCategory !== 'overview' && activeCategory !== 'guide') {
    // Show specific category books
    const categoryId = parseInt(activeCategory);
    const category = categories.find(c => c.id === categoryId);
    if (category) {
      const books = booksByCategory[categoryId];
      const filteredBooks = searchQuery ?
        books.filter(book =>
          book[0].toLowerCase().includes(searchQuery) ||
          book[1].toLowerCase().includes(searchQuery) ||
          book[2].toLowerCase().includes(searchQuery)
        ) : books;

      if (filteredBooks.length > 0) {
        html += `
          <section class="section">
            <div class="section-header">
              <h2 class="section-title">${category.emoji} ${category.name}</h2>
              <span class="section-count">${filteredBooks.length}本</span>
            </div>
            <div class="section-description">${category.description}</div>
            <ul class="book-list">`;

        filteredBooks.forEach((book, index) => {
          const bookTitle = book[0];
          const bookLink = navigationLinks[bookTitle];
          const hasNote = !!bookLink;

          html += `
            <li class="book-item" ${hasNote ? 'style="cursor: pointer;" onclick="window.location.href=\'' + bookLink + '\'' : ''}>
              <div class="book-rank${index < 3 ? ' top-rank' : ''}">${index + 1}</div>
              <div class="book-info">
                <div class="book-title">${bookTitle}${hasNote ? `<a href="${bookLink}" class="book-link" target="_blank"> →</a>` : ''}</div>
                <div class="book-author">${book[1]}</div>
                <div class="book-description">${book[2]}</div>
              </div>
            </li>`;
        });

        html += '</ul></section>';
      }
    }
  }

  // Empty state
  if (!html) {
    html = `
      <div class="empty-state">
        <div class="empty-state-icon">🔍</div>
        <div class="empty-state-text">没有找到匹配的书籍</div>
        <div class="empty-state-subtext">尝试调整搜索关键词或浏览其他分类</div>
      </div>`;
  }

  mainContent.innerHTML = html;
}

// Initialize the application
document.addEventListener('DOMContentLoaded', function() {
  initializeNavigation();
  renderContent();

  // Smooth scrolling for navigation
  document.querySelectorAll('.nav-button').forEach(button => {
    button.addEventListener('click', function() {
      const targetCategory = this.dataset.category;
      const navButtons = document.querySelectorAll('.nav-button');

      navButtons.forEach(btn => btn.classList.remove('active'));
      this.classList.add('active');

      // Scroll to top when switching categories
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });
});

// Keyboard navigation support
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    document.getElementById('searchInput').value = '';
    renderContent();
  }
});
</script>
</body>
</html>
