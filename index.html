<style>
:root {
  --bg: #0a0a0b;
  --bg2: #111113;
  --s: #18181b;
  --s2: #1f1f23;
  --s3: #27272a;
  --t: #fafafa;
  --t2: #a1a1aa;
  --t3: #71717a;
  --a: #f59e0b;
  --a2: #d97706;
  --a3: #fbbf24;
  --green: #22c55e;
  --blue: #3b82f6;
  --purple: #a855f7;
  --pink: #ec4899;
  --b: #27272a;
  --r: 16px;
  --r-sm: 10px;
  --max: 1400px;
  --shadow: 0 4px 30px rgba(0,0,0,0.4);
  --glow: 0 0 40px rgba(245,158,11,0.15);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--t);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
.bg-grid {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: 
    radial-gradient(circle at 20% 20%, rgba(245,158,11,0.03) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(168,85,247,0.03) 0%, transparent 50%);
  pointer-events: none;
  z-index: -1;
}
.hero {
  position: relative;
  padding: 120px 24px 100px;
  text-align: center;
  max-width: var(--max);
  margin: 0 auto;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -100px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(245,158,11,.12) 0%, transparent 70%);
  pointer-events: none;
  z-index: -1;
  animation: pulse 4s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.5; transform: translateX(-50%) scale(1); }
  50% { opacity: 1; transform: translateX(-50%) scale(1.1); }
}
.hero h1 {
  font-size: clamp(3rem, 8vw, 5rem);
  font-weight: 900;
  margin-bottom: 20px;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, var(--a) 0%, var(--a3) 50%, #fff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero .subtitle {
  font-size: 1.3rem;
  color: var(--t2);
  margin-bottom: 28px;
  font-weight: 300;
  letter-spacing: 0.1em;
}
.hero .stats {
  display: flex;
  justify-content: center;
  gap: 48px;
  margin-top: 40px;
}
.stat-item { text-align: center; }
.stat-number {
  font-size: 2.5rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--a), var(--a3));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.stat-label { font-size: 0.9rem; color: var(--t3); font-weight: 500; }
nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,10,11,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--b);
  padding: 16px 0;
}
.nav-container {
  max-width: var(--max);
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  gap: 10px;
  overflow-x: auto;
  scrollbar-width: none;
}
.nav-container::-webkit-scrollbar { display: none; }
.nav-button {
  padding: 10px 20px;
  border-radius: 100px;
  border: 1px solid var(--b);
  background: transparent;
  color: var(--t2);
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  white-space: nowrap;
  flex-shrink: 0;
}
.nav-button:hover { background: var(--s2); color: var(--t); border-color: var(--a); }
.nav-button.active {
  background: linear-gradient(135deg, var(--a), var(--a2));
  color: #000;
  border-color: var(--a);
  font-weight: 700;
  box-shadow: 0 4px 20px rgba(245,158,11,.3);
}
.search-wrapper { max-width: var(--max); margin: 32px auto 0; padding: 0 24px; }
.search-bar {
  width: 100%;
  padding: 18px 28px;
  border-radius: 100px;
  border: 2px solid var(--b);
  background: var(--s);
  color: var(--t);
  font-size: 1.1rem;
  outline: none;
  transition: all 0.3s;
}
.search-bar::placeholder { color: var(--t3); }
.search-bar:focus { border-color: var(--a); box-shadow: 0 0 0 4px rgba(245,158,11,.1); }
.content-wrapper { max-width: var(--max); margin: 0 auto; padding: 40px 24px; }
.section { margin-bottom: 80px; animation: fadeInUp 0.6s ease-out; }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.section-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
.section-title {
  font-size: 2rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--t), var(--t2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.section-count {
  font-size: 0.85rem;
  color: var(--a);
  background: rgba(245,158,11,.1);
  padding: 6px 14px;
  border-radius: 100px;
  font-weight: 600;
}
.section-desc { color: var(--t3); font-size: 1rem; margin-bottom: 32px; max-width: 600px; }

/* ===== CURRENT READING HERO CARDS ===== */
.current-hero {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  margin-bottom: 32px;
}
@media (max-width: 1024px) { .current-hero { grid-template-columns: 1fr; } }
.book-hero {
  position: relative;
  background: var(--s);
  border-radius: var(--r);
  border: 1px solid var(--b);
  overflow: hidden;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  text-decoration: none;
  color: inherit;
}
.book-hero::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--a), var(--a3));
}
.book-hero:nth-child(2)::before { background: linear-gradient(90deg, var(--purple), var(--pink)); }
.book-hero:nth-child(3)::before { background: linear-gradient(90deg, var(--blue), var(--green)); }
.book-hero:hover {
  transform: translateY(-8px);
  border-color: var(--a);
  box-shadow: var(--glow), var(--shadow);
}
.book-hero:nth-child(2):hover { border-color: var(--purple); box-shadow: 0 0 40px rgba(168,85,247,.15), var(--shadow); }
.book-hero:nth-child(3):hover { border-color: var(--blue); box-shadow: 0 0 40px rgba(59,130,246,.15), var(--shadow); }
.book-hero-header { padding: 28px 28px 0; }
.book-number {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--a);
  text-transform: uppercase;
  letter-spacing: 0.15em;
  margin-bottom: 12px;
}
.book-hero:nth-child(2) .book-number { color: var(--purple); }
.book-hero:nth-child(3) .book-number { color: var(--blue); }
.book-hero h3 { font-size: 1.5rem; font-weight: 800; color: var(--t); margin-bottom: 8px; line-height: 1.3; }
.book-author { font-size: 1rem; color: var(--t2); font-weight: 500; margin-bottom: 16px; }
.book-tag {
  display: inline-block;
  padding: 6px 14px;
  border-radius: 100px;
  font-size: 0.8rem;
  font-weight: 600;
  background: rgba(245,158,11,.12);
  color: var(--a);
  border: 1px solid rgba(245,158,11,.2);
}
.book-hero:nth-child(2) .book-tag { background: rgba(168,85,247,.12); color: var(--purple); border-color: rgba(168,85,247,.2); }
.book-hero:nth-child(3) .book-tag { background: rgba(59,130,246,.12); color: var(--blue); border-color: rgba(59,130,246,.2); }
.book-hero-body { padding: 20px 28px; flex: 1; }
.book-desc { color: var(--t2); font-size: 0.95rem; line-height: 1.7; margin-bottom: 16px; }
.book-goal {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  background: var(--s2);
  border-radius: var(--r-sm);
  font-size: 0.9rem;
  color: var(--green);
  font-weight: 500;
}
.book-hero-footer { padding: 16px 28px 24px; border-top: 1px solid var(--b); }
.book-cta { display: flex; align-items: center; justify-content: space-between; color: var(--t2); font-size: 0.9rem; font-weight: 500; }
.book-cta span:last-child { color: var(--a); transition: transform 0.3s; }
.book-hero:hover .book-cta span:last-child { transform: translateX(4px); }
.book-progress { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
.progress-track { flex: 1; height: 4px; background: var(--s3); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; }
.book-hero:nth-child(1) .progress-fill { width: 65%; background: linear-gradient(90deg, var(--a), var(--a3)); }
.book-hero:nth-child(2) .progress-fill { width: 40%; background: linear-gradient(90deg, var(--purple), var(--pink)); }
.book-hero:nth-child(3) .progress-fill { width: 80%; background: linear-gradient(90deg, var(--blue), var(--green)); }
.progress-label { font-size: 0.75rem; color: var(--t3); font-weight: 600; white-space: nowrap; }

/* ===== CATEGORY GRID ===== */
.category-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}
.category-card {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 20px 24px;
  background: var(--s);
  border-radius: var(--r);
  border: 1px solid var(--b);
  cursor: pointer;
  transition: all 0.3s;
}
.category-card:hover { border-color: var(--a); transform: translateX(4px); background: var(--s2); }
.category-emoji {
  font-size: 1.8rem;
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--s2);
  border-radius: 12px;
}
.category-info { flex: 1; }
.category-name { font-weight: 700; font-size: 1rem; color: var(--t); margin-bottom: 4px; }
.category-stats { font-size: 0.85rem; color: var(--t3); }
.category-arrow { color: var(--t3); font-size: 1.2rem; transition: transform 0.3s; }
.category-card:hover .category-arrow { transform: translateX(4px); color: var(--a); }

/* ===== BOOK LIST ===== */
.book-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
.book-item {
  display: flex;
  gap: 16px;
  padding: 20px;
  background: var(--s);
  border-radius: var(--r-sm);
  border: 1px solid var(--b);
  transition: all 0.3s;
  cursor: pointer;
}
.book-item:hover { border-color: var(--a); transform: translateY(-2px); }
.book-item-number { font-size: 0.75rem; font-weight: 700; color: var(--t3); min-width: 24px; }
.book-item-info h4 { font-size: 1rem; font-weight: 600; color: var(--t); margin-bottom: 4px; }
.book-item-info p { font-size: 0.85rem; color: var(--t3); }

/* ===== GUIDE ===== */
.guide-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 24px; }
.guide-card { padding: 28px; background: var(--s); border-radius: var(--r); border: 1px solid var(--b); }
.guide-card h3 { font-size: 1.2rem; font-weight: 700; color: var(--a); margin-bottom: 16px; }
.guide-card ul { list-style: none; padding: 0; }
.guide-card li { padding: 8px 0; color: var(--t2); font-size: 0.9rem; border-bottom: 1px solid var(--b); }
.guide-card li:last-child { border: none; }
.guide-card li strong { color: var(--t); }

/* ===== FOOTER ===== */
footer { padding: 60px 24px; text-align: center; border-top: 1px solid var(--b); margin-top: 80px; }
.footer-text { color: var(--t3); font-size: 0.9rem; margin-bottom: 20px; }
.footer-links { display: flex; justify-content: center; gap: 24px; }
.footer-links a { color: var(--t2); text-decoration: none; font-size: 0.9rem; transition: color 0.3s; }
.footer-links a:hover { color: var(--a); }

/* Empty State */
.empty-state { text-align: center; padding: 80px 20px; color: var(--t3); }
.empty-state-icon { font-size: 4rem; margin-bottom: 20px; }
.empty-state-text { font-size: 1.2rem; font-weight: 600; color: var(--t2); }

@media (max-width: 768px) {
  .hero { padding: 80px 20px 60px; }
  .hero h1 { font-size: 2.5rem; }
  .hero .stats { gap: 24px; }
  .stat-number { font-size: 2rem; }
  .current-hero { grid-template-columns: 1fr; }
  .category-grid { grid-template-columns: 1fr; }
}
</style>
</head>

function initNav() {
  const nav = document.getElementById('navigation');
  const items = [{ id: 'all', name: '全部' }, { id: 'current', name: '🔥 当前阅读' }, { id: 'overview', name: '📊 分类概览' }];
  categories.forEach(c => items.push({ id: c.id.toString(), name: `${c.emoji} ${c.name}` }));
  items.push({ id: 'guide', name: '💡 阅读指南' });
  items.forEach(item => {
    const btn = document.createElement('button');
    btn.className = `nav-button${item.id === 'all' ? ' active' : ''}`;
    btn.dataset.category = item.id;
    btn.textContent = item.name;
    btn.onclick = () => filterBy(item.id);
    nav.appendChild(btn);
  });
}

let activeCategory = 'all';
function filterBy(id) {
  activeCategory = id;
  document.querySelectorAll('.nav-button').forEach(b => b.classList.toggle('active', b.dataset.category === id));
  render();
}

document.getElementById('searchInput').addEventListener('input', render);

function render() {
  const main = document.getElementById('mainContent');
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let html = '';

  // Current Reading
