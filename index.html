let activeCat='all';
function filter(cat){
activeCat=cat;
document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('active',b.dataset.cat==cat));
render();
}

function render(){
const app=document.getElementById('app');
const q=document.getElementById('search').value.trim().toLowerCase();
let html='';

if(activeCat==='current'||activeCat==='all'){
const cbooks=[
{t:"第二座山",a:"大卫·布鲁克斯",tag:"道德喜乐",d:"从个人主义走向关系主义",g:"理解承诺与奉献的力量"},
{t:"重启人生",a:"亚瑟·布鲁克斯",tag:"职业转型",d:"应对职业倦怠与中年危机",g:"从流体智力向晶体智力转型"},
{t:"与塞涅卡共进早餐",a:"大卫·菲德勒",tag:"斯多葛哲学",d:"古老智慧应对现代焦虑",g:"内心宁静与情绪管理"}
];
let matchC=cbooks.filter(b=>!q||b.t.toLowerCase().includes(q)||b.a.toLowerCase().includes(q)||b.d.toLowerCase().includes(q));
if(matchC.length&&(activeCat==='current'||activeCat==='all')){
html+='<div class="sec"><h2>📖 当前阅读</h2><div class="cb-grid">';
matchC.forEach(b=>{
html+='<div class="cb"><h3>《'+b.t+'》</h3><div class="au">'+b.a+'</div><span class="tg">'+b.tag+'</span><div class="ds">'+b.d+'</div><div class="gl">🎯 '+b.g+'</div></div>';
});
html+='</div></div>';
}
}

if(activeCat==='overview'||activeCat==='all'){
html+='<div class="sec"><h2>📊 分类概览</h2><div class="ov">';
C.forEach(c=>{
const cnt=B[c.id].length;
const pct=Math.round(cnt/285*100);
html+='<div class="ovc" onclick="filter('+c.id+')"><div><div class="cn">'+c.e+' '+c.n+'</div><div class="cc">'+cnt+'本 · '+pct+'%</div><div class="bar"><div class="bf" style="width:'+pct+'%"></div></div></div></div>';
});
html+='</div></div>';
}

if(activeCat==='guide'||activeCat==='all'){
html+='<div class="sec"><h2>💡 阅读指南</h2><div class="gg">';
html+='<div class="gc"><h3>🎯 按需选择</h3><p>需要解决问题 → 实用技能类<br>追求自我成长 → 认知成长类<br>理解社会运行 → 历史社科类<br>把握科技趋势 → 科技科普类<br>建立财富观念 → 投资理财类</p></div>';
html+='<div class="gc"><h3>📅 按场景阅读</h3><p>通勤碎片：认知成长、科技科普<br>周末深度：历史社科、哲学宗教<br>工作学习：实用技能、技术类<br>投资理财：投资理财、金融类</p></div>';
html+='<div class="gc"><h3>⭐ 精读建议</h3><p>每类前5本为核心必读。从最重要的开始，深度内化后再拓展。<br><br>阅读 ≠ 读完，真正吸收并实践才算完成。</p></div>';
html+='</div></div>';
}

// Book sections
const showCats=activeCat==='all'?C.map(c=>c.id):[parseInt(activeCat)].filter(id=>B[id]);
showCats.forEach(id=>{
const c=C.find(x=>x.id===id);
if(!c)return;
let items=B[id].map((b,i)=>({title:b[0],author:b[1],desc:b[2],rank:i+1}));
if(q)items=items.filter(b=>b.title.toLowerCase().includes(q)||b.author.toLowerCase().includes(q)||b.desc.toLowerCase().includes(q));
if(!items.length)return;
html+='<div class="sec"><div class="sec-h"><h2>'+c.e+' '+c.n+'</h2><span class="cnt">'+items.length+'本</span></div><div class="sec-sub">'+c.d+'</div><ul class="bl">';
items.forEach(b=>{
const link=LINKS[b.title];
const clickable=link?'cursor:pointer;':'';
const arrow=link?' <span style="color:var(--a);font-size:.8rem">→</span>':'';
html+='<li class="bi" style="'+clickable+'"'+(link?' onclick="location.href=\''+link+'\'"':'')+'><div class="rk'+(b.rank<=3?' t3':'')+'">'+b.rank+'</div><div class="bf"><h3>《'+b.title+'》'+arrow+'</h3><div class="ba">'+b.author+'</div><div class="bd">'+b.desc+'</div></div></li>';
});
html+='</ul></div>';
});

app.innerHTML=html||'<div style="text-align:center;padding:60px 20px;color:var(--t2)"><p style="font-size:1.2rem">🔍 没有找到匹配的书籍</p></div>';
}

document.getElementById('search').addEventListener('input',render);
render();
</script>
