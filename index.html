<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>我的书单 | 300本精选好书深度笔记</title>
  <meta name="description" content="300本精选好书的深度读书笔记，涵盖文学虚构、实用技能、认知成长、历史社科、科技科普等领域。每本书都有详尽的读书笔记和思维导图。">
  <meta name="keywords" content="书单,读书笔记,文学虚构,实用技能,认知成长,历史社科,科技科普,好书推荐">
  <meta name="author" content="朱宝">
  <meta name="theme-color" content="#e8a838" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f5f5f5" media="(prefers-color-scheme: light)">
  <meta property="og:title" content="我的书单">
  <meta property="og:description" content="300本精选好书的深度读书笔记">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://zhubao315.github.io/my-booklist/">
  <link rel="canonical" href="https://zhubao315.github.io/my-booklist/">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/data.js"></script>
  <script src="js/app.js" defer></script>
</head>
<body>
  <!-- Reading Progress -->
  <div id="reading-progress" class="reading-progress"></div>

  <!-- Top Navigation -->
  <nav class="top-nav" role="navigation" aria-label="主导航">
    <div class="brand"><span>📚</span> 我的书单</div>
    <div class="top-nav-actions">
      <button id="stats-toggle" class="stats-toggle" aria-label="阅读统计">📊 统计</button>
      <button id="theme-toggle" class="theme-toggle" aria-label="切换主题">☀️</button>
    </div>
  </nav>

  <!-- Hero -->
  <header class="hero" role="banner">
    <h1>我的书单</h1>
    <p class="subtitle">MY BOOKLIST</p>
    <p class="description">
      精选300本改变思维的好书，每一本都配有深度读书笔记。
      从文学虚构到科技科普，从哲学宗教到传记人物——在这里，找到你的下一本书。
    </p>
    <div class="stats-bar" aria-label="阅读统计概览">
      <div class="stat-item"><span id="stat-total" class="stat-number">0</span><span class="stat-label">总藏书</span></div>
      <div class="stat-item"><span id="stat-done" class="stat-number">0</span><span class="stat-label">已读</span></div>
      <div class="stat-item"><span id="stat-notes" class="stat-number">0</span><span class="stat-label">有笔记</span></div>
      <div class="stat-item"><span id="stat-categories" class="stat-number">0</span><span class="stat-label">分类</span></div>
    </div>
  </header>

  <!-- Search & Filters -->
  <section class="search-container" aria-label="搜索">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="search" id="search-input" class="search-bar" placeholder="搜索书名、作者、主题..." aria-label="搜索书籍" autocomplete="off">
    </div>
  </section>

  <div class="filters" role="toolbar" aria-label="筛选">
    <select id="status-filter" class="filter-select" aria-label="阅读状态">
      <option value="all">全部状态</option>
      <option value="done">已读</option>
      <option value="reading">在读</option>
      <option value="want">想读</option>
    </select>
    <select id="sort-filter" class="filter-select" aria-label="排序方式">
      <option value="default">默认排序</option>
      <option value="title">按书名</option>
      <option value="author">按作者</option>
      <option value="rating">按评分</option>
      <option value="category">按分类</option>
    </select>
  </div>

  <!-- Category Navigation -->
  <nav class="category-nav" aria-label="分类导航">
    <button class="category-btn active" data-cat="1">📖 文学虚构类</button>
    <button class="category-btn" data-cat="2">🛠️ 实用技能类</button>
    <button class="category-btn" data-cat="3">🧠 认知成长类</button>
    <button class="category-btn" data-cat="4">🏛️ 历史社科类</button>
    <button class="category-btn" data-cat="5">🔬 科技科普类</button>
    <button class="category-btn" data-cat="6">💰 投资理财类</button>
    <button class="category-btn" data-cat="7">👤 传记人物类</button>
    <button class="category-btn" data-cat="8">🎨 艺术美学类</button>
    <button class="category-btn" data-cat="9">🕉️ 哲学宗教类</button>
  </nav>

  <!-- Main Content -->
  <main class="content-section" role="main">
    <div class="section-header">
      <h2 class="section-title">全部书籍</h2>
      <span id="section-count" class="section-count"></span>
    </div>

    <!-- Book Grid -->
    <div id="book-grid" class="book-grid" aria-label="书单列表"></div>

    <!-- Empty State -->
    <div id="empty-state" class="empty-state" style="display:none">
      <span class="empty-state-icon">🔍</span>
      <h3>没有找到匹配的书籍</h3>
      <p>试试调整筛选条件或搜索词</p>
    </div>

    <!-- Pagination -->
    <div class="pagination" aria-label="分页">
      <button id="prev-page" aria-label="上一页">← 上一页</button>
      <span id="page-info" style="color:var(--t2);padding:8px 16px"></span>
      <button id="next-page" aria-label="下一页">下一页 →</button>
    </div>
  </main>

  <!-- Stats Panel -->
  <div id="stats-overlay" class="stats-overlay"></div>
  <aside id="stats-panel" class="stats-panel" role="complementary" aria-label="阅读统计"></aside>

  <!-- Footer -->
  <footer class="site-footer" role="contentinfo">
    <div class="footer-links">
      <a href="https://github.com/zhubao315/my-booklist" target="_blank" rel="noopener">GitHub</a>
      <a href="sitemap.xml">Sitemap</a>
    </div>
    <p>📚 我的书单 · 用阅读丈量世界</p>
    <p style="margin-top:8px">快捷键: <kbd>/</kbd> 搜索 · <kbd>t</kbd> 主题 · <kbd>s</kbd> 统计 · <kbd>Esc</kbd> 关闭</p>
  </footer>

  <!-- Toast -->
  <div id="toast" class="toast"></div>
</body>
</html>
