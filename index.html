:root {
  --bg: #0a0a0b;
  --s: #18181b;
  --s2: #1f1f23;
  --s3: #27272a;
  --t: #fafafa;
  --t2: #a1a1aa;
  --t3: #71717a;
  --a: #f59e0b;
  --a2: #d97706;
  --a3: #fbbf24;
  --green: #22c55e;
  --blue: #3b82f6;
  --purple: #a855f7;
  --pink: #ec4899;
  --b: #27272a;
  --r: 16px;
  --r-sm: 10px;
  --max: 1400px;
  --shadow: 0 4px 30px rgba(0,0,0,0.4);
  --glow: 0 0 40px rgba(245,158,11,0.15);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; font-size: 16px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: var(--bg);

  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
a { color: inherit; text-decoration: none; }

/* Background */
.bg-grid {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background-image: radial-gradient(circle at 20% 20%, rgba(245,158,11,0.03) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(168,85,247,0.03) 0%, transparent 50%);
  pointer-events: none; z-index: -1;
}

/* Hero */
.hero {
  position: relative; padding: 80px 20px 60px; text-align: center;
  max-width: var(--max); margin: 0 auto; overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; top: -100px; left: 50%; transform: translateX(-50%);
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(245,158,11,.12) 0%, transparent 70%);
  pointer-events: none; z-index: -1; animation: pulse 4s ease-in-out infinite;
}
@keyframes pulse { 0%, 100% { opacity: .5; } 50% { opacity: 1; } }
.hero h1 {
  font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 900; margin-bottom: 16px; letter-spacing: -0.03em;
  background: linear-gradient(135deg, var(--a), var(--a3), #fff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.hero .subtitle { font-size: 1.1rem; color: var(--t2); margin-bottom: 24px; font-weight: 300; letter-spacing: .1em; }
.hero .stats { display: flex; justify-content: center; gap: 32px; margin-top: 32px; }
.stat-item { text-align: center; }
.stat-number { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, var(--a), var(--a3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.stat-label { font-size: .8rem; color: var(--t3); }

/* Nav */
nav { position: sticky; top: 0; z-index: 100; background: rgba(10,10,11,.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--b); padding: 12px 0; }
.nav-container { max-width: var(--max); margin: 0 auto; padding: 0 16px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
.nav-container::-webkit-scrollbar { display: none; }
.nav-button {
  padding: 8px 16px; border-radius: 100px; border: 1px solid var(--b); background: transparent;
  color: var(--t2); font-size: .85rem; font-weight: 500; cursor: pointer; transition: all .3s; white-space: nowrap; flex-shrink: 0;
}
.nav-button:hover { background: var(--s2); color: var(--t); border-color: var(--a); }
.nav-button.active { background: linear-gradient(135deg, var(--a), var(--a2)); color: #000; border-color: var(--a); font-weight: 700; }

/* Search */
.search-wrapper { max-width: var(--max); margin: 24px auto 0; padding: 0 16px; }
.search-bar { width: 100%; padding: 14px 24px; border-radius: 100px; border: 2px solid var(--b); background: var(--s); color: var(--t); font-size: 1rem; outline: none; transition: all .3s; }
.search-bar::placeholder { color: var(--t3); }
.search-bar:focus { border-color: var(--a); box-shadow: 0 0 0 4px rgba(245,158,11,.1); }

/* Content */
.content-wrapper { max-width: var(--max); margin: 0 auto; padding: 32px 16px; }
.section { margin-bottom: 64px; animation: fadeInUp .6s ease-out; }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.section-title { font-size: 1.6rem; font-weight: 800; background: linear-gradient(135deg, var(--t), var(--t2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.section-count { font-size: .8rem; color: var(--a); background: rgba(245,158,11,.1); padding: 4px 12px; border-radius: 100px; font-weight: 600; }
.section-desc { color: var(--t3); font-size: .9rem; margin-bottom: 24px; }

/* Current Reading Hero */
.current-hero { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 32px; }
.book-hero {
  position: relative; background: var(--s); border-radius: var(--r); border: 1px solid var(--b);
  overflow: hidden; transition: all .4s; cursor: pointer; display: flex; flex-direction: column;
  text-decoration: none; color: inherit;
}
.book-hero::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--a), var(--a3)); }
.book-hero:nth-child(2)::before { background: linear-gradient(90deg, var(--purple), var(--pink)); }
.book-hero:nth-child(3)::before { background: linear-gradient(90deg, var(--blue), var(--green)); }
.book-hero:hover { transform: translateY(-6px); border-color: var(--a); box-shadow: var(--glow), var(--shadow); }
.book-hero:nth-child(2):hover { border-color: var(--purple); box-shadow: 0 0 40px rgba(168,85,247,.15), var(--shadow); }
.book-hero:nth-child(3):hover { border-color: var(--blue); box-shadow: 0 0 40px rgba(59,130,246,.15), var(--shadow); }
.book-hero-header { padding: 24px 24px 0; }
.book-number { font-size: .7rem; font-weight: 700; color: var(--a); text-transform: uppercase; letter-spacing: .15em; margin-bottom: 10px; }
.book-hero:nth-child(2) .book-number { color: var(--purple); }
.book-hero:nth-child(3) .book-number { color: var(--blue); }
.book-hero h3 { font-size: 1.3rem; font-weight: 800; color: var(--t); margin-bottom: 6px; }
.book-author { font-size: .9rem; color: var(--t2); margin-bottom: 12px; }
.book-tag { display: inline-block; padding: 4px 12px; border-radius: 100px; font-size: .75rem; font-weight: 600; background: rgba(245,158,11,.12); color: var(--a); border: 1px solid rgba(245,158,11,.2); }
.book-hero:nth-child(2) .book-tag { background: rgba(168,85,247,.12); color: var(--purple); border-color: rgba(168,85,247,.2); }
.book-hero:nth-child(3) .book-tag { background: rgba(59,130,246,.12); color: var(--blue); border-color: rgba(59,130,246,.2); }
.book-hero-body { padding: 16px 24px; flex: 1; }
.book-desc { color: var(--t2); font-size: .9rem; line-height: 1.6; margin-bottom: 12px; }
.book-goal { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--s2); border-radius: var(--r-sm); font-size: .85rem; color: var(--green); font-weight: 500; }
.book-hero-footer { padding: 14px 24px 20px; border-top: 1px solid var(--b); }
.book-cta { display: flex; align-items: center; justify-content: space-between; color: var(--t2); font-size: .85rem; font-weight: 500; }
.book-cta span:last-child { color: var(--a); transition: transform .3s; }
.book-hero:hover .book-cta span:last-child { transform: translateX(4px); }
.book-progress { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
.progress-track { flex: 1; height: 4px; background: var(--s3); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; }
.book-hero:nth-child(1) .progress-fill { width: 65%; background: linear-gradient(90deg, var(--a), var(--a3)); }
.book-hero:nth-child(2) .progress-fill { width: 40%; background: linear-gradient(90deg, var(--purple), var(--pink)); }
.book-hero:nth-child(3) .progress-fill { width: 80%; background: linear-gradient(90deg, var(--blue), var(--green)); }
.progress-label { font-size: .7rem; color: var(--t3); font-weight: 600; white-space: nowrap; }

.category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
.category-card {

.category-card:hover { border-color: var(--a); transform: translateX(4px); background: var(--s2); }
.category-emoji { font-size: 1.5rem; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: var(--s2); border-radius: 10px; }
.category-info { flex: 1; }
.category-name { font-weight: 700; font-size: .95rem; color: var(--t); margin-bottom: 2px; }
.category-stats { font-size: .8rem; color: var(--t3); }
.category-arrow { color: var(--t3); transition: transform .3s; }
.category-card:hover .category-arrow { transform: translateX(4px); color: var(--a); }

/* Book List */
.book-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.book-item {
  display: flex; gap: 14px; padding: 16px; background: var(--s); border-radius: var(--r-sm);

.book-item:hover { border-color: var(--a); transform: translateY(-2px); }
.book-item-number { font-size: .7rem; font-weight: 700; color: var(--t3); min-width: 20px; }
.book-item-info { flex: 1; }
.book-item-info h4 { font-size: .95rem; font-weight: 600; color: var(--t); margin-bottom: 2px; }
.book-item-info p { font-size: .8rem; color: var(--t3); }
.book-item .note-badge { font-size: .7rem; padding: 2px 8px; border-radius: 100px; background: rgba(245,158,11,.15); color: var(--a); font-weight: 600; }

/* Guide */
.guide-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
.guide-card { padding: 24px; background: var(--s); border-radius: var(--r); border: 1px solid var(--b); }
.guide-card h3 { font-size: 1.1rem; font-weight: 700; color: var(--a); margin-bottom: 14px; }
.guide-card ul { list-style: none; padding: 0; }
.guide-card li { padding: 6px 0; color: var(--t2); font-size: .85rem; border-bottom: 1px solid var(--b); }
.guide-card li:last-child { border: none; }
.guide-card li strong { color: var(--t); }

/* Footer */
footer { padding: 48px 20px; text-align: center; border-top: 1px solid var(--b); margin-top: 64px; }
.footer-text { color: var(--t3); font-size: .85rem; margin-bottom: 16px; }
.footer-links { display: flex; justify-content: center; gap: 20px; }
.footer-links a { color: var(--t2); font-size: .85rem; transition: color .3s; }
.footer-links a:hover { color: var(--a); }

/* Empty */
.empty-state { text-align: center; padding: 60px 20px; color: var(--t3); }
.empty-state-icon { font-size: 3rem; margin-bottom: 16px; }

/* ===== MOBILE ===== */
@media (max-width: 1024px) {
  .current-hero { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 768px) {
  .hero { padding: 60px 16px 40px; }
  .hero h1 { font-size: 2.2rem; }
  .hero .stats { gap: 20px; }
  .stat-number { font-size: 1.6rem; }
  .current-hero { grid-template-columns: 1fr; }
  .category-grid { grid-template-columns: 1fr 1fr; }
  .book-list { grid-template-columns: 1fr; }
  .guide-grid { grid-template-columns: 1fr; }
  .section-title { font-size: 1.3rem; }
  .nav-button { padding: 6px 12px; font-size: .8rem; }
}
@media (max-width: 480px) {
  .category-grid { grid-template-columns: 1fr; }
  .hero h1 { font-size: 1.8rem; }
  .search-bar { padding: 12px 18px; font-size: .9rem; }
}
</style>

  8: [["艺术的故事","贡布里希"],["美的历程","李泽厚"],["艺术哲学","丹纳"],["观看之道","伯格"],["中国美学史","李泽厚"]],
  9: [["沉思录","马可·奥勒留"],["道德经","老子"],["庄子","庄子"],["理想国","柏拉图"],["存在与时间","海德格尔"],["纯粹理性批判","康德"]]
};

function initNav() {
  const nav = document.getElementById('navigation');
  const items = [{ id: 'all', name: '全部' }, { id: 'current', name: '🔥 当前阅读' }, { id: 'overview', name: '📊 分类概览' }];
  categories.forEach(c => items.push({ id: c.id.toString(), name: `${c.emoji} ${c.name}` }));
  items.push({ id: 'guide', name: '💡 阅读指南' });
  items.forEach(item => {
    const btn = document.createElement('button');
    btn.className = `nav-button${item.id === 'all' ? ' active' : ''}`;
    btn.dataset.category = item.id;
    btn.textContent = item.name;
    btn.onclick = () => filterBy(item.id);
    nav.appendChild(btn);
  });
}

let activeCategory = 'all';
function filterBy(id) {
  activeCategory = id;
  document.querySelectorAll('.nav-button').forEach(b => b.classList.toggle('active', b.dataset.category === id));
  render();
  if (id !== 'all') window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.getElementById('searchInput').addEventListener('input', render);

function render() {
  const main = document.getElementById('mainContent');
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let html = '';

  if (activeCategory === 'current' || activeCategory === 'all') {
    const filtered = currentReading.filter(b => !q || b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q));
    if (filtered.length > 0) {
      html += `<section class="section"><div class="section-header"><h2 class="section-title">📖 当前阅读</h2><span class="section-count">${filtered.length}本进行中</span></div><p class="section-desc">正在深度研读的核心书籍，配有详细读书笔记</p><div class="current-hero">`;
      filtered.forEach((book, i) => {
        html += `<a href="${book.noteLink}" class="book-hero"><div class="book-hero-header"><div class="book-number">正在阅读 · ${String(i+1).padStart(2,'0')}</div><h3>${book.title}</h3><div class="book-author">${book.author}</div><span class="book-tag">${book.tag}</span></div><div class="book-hero-body"><p class="book-desc">${book.desc}</p><div class="book-goal">🎯 ${book.goal}</div></div><div class="book-hero-footer"><div class="book-cta"><span>查看详细笔记</span><span>→</span></div><div class="book-progress"><div class="progress-track"><div class="progress-fill"></div></div><span class="progress-label">${book.progress}% · ${book.status}</span></div></div></a>`;
      });
      html += '</div></section>';
    }
  }

  if (activeCategory === 'overview' || activeCategory === 'all') {
    html += `<section class="section"><div class="section-header"><h2 class="section-title">📊 分类概览</h2><span class="section-count">${categories.length}个分类</span></div><p class="section-desc">探索不同领域的知识体系</p><div class="category-grid">`;
    categories.forEach(c => {
      const count = booksByCategory[c.id]?.length || 0;
      const noteCount = (booksByCategory[c.id] || []).filter(([t]) => getNoteLink(t)).length;
      html += `<div class="category-card" onclick="filterBy(${c.id})"><div class="category-emoji">${c.emoji}</div><div class="category-info"><div class="category-name">${c.name}</div><div class="category-stats">${count}本 · ${noteCount > 0 ? noteCount + '篇笔记' : c.desc}</div></div><div class="category-arrow">→</div></div>`;
    });
    html += '</div></section>';
  }

  if (!['current','overview','guide'].includes(activeCategory)) {
    const catId = parseInt(activeCategory);
    const cat = categories.find(c => c.id === catId);
    const books = booksByCategory[catId] || [];
    const filtered = books.filter(([t, a]) => !q || t.toLowerCase().includes(q) || a.toLowerCase().includes(q));
    html += `<section class="section"><div class="section-header"><h2 class="section-title">${cat.emoji} ${cat.name}</h2><span class="section-count">${filtered.length}本</span></div><p class="section-desc">${cat.desc}</p><div class="book-list">`;
    filtered.forEach(([title, author], i) => {
      const noteLink = getNoteLink(title);
      if (noteLink) {
        html += `<a href="${noteLink}" class="book-item"><span class="book-item-number">${String(i+1).padStart(2,'0')}</span><div class="book-item-info"><h4>${title}</h4><p>${author}</p></div><span class="note-badge">📝 笔记</span></a>`;
      } else {
        html += `<div class="book-item"><span class="book-item-number">${String(i+1).padStart(2,'0')}</span><div class="book-item-info"><h4>${title}</h4><p>${author}</p></div></div>`;
      }
    });
    html += '</div></section>';
  }

  if (activeCategory === 'guide' || activeCategory === 'all') {
    html += `<section class="section"><div class="section-header"><h2 class="section-title">💡 阅读指南</h2></div><div class="guide-grid"><div class="guide-card"><h3>🎯 按需选择</h3><ul><li><strong>需要解决问题</strong> → 实用技能类</li><li><strong>追求自我成长</strong> → 认知成长类</li><li><strong>理解社会运行</strong> → 历史社科类</li><li><strong>把握科技趋势</strong> → 科技科普类</li><li><strong>建立财富观念</strong> → 投资理财类</li></ul></div><div class="guide-card"><h3>📅 按场景阅读</h3><ul><li><strong>通勤碎片时间</strong>：认知成长类</li><li><strong>周末深度阅读</strong>：历史社科、哲学宗教</li><li><strong>工作学习间隙</strong>：实用技能类</li><li><strong>睡前放松时光</strong>：文学虚构、艺术美学</li></ul></div><div class="guide-card"><h3>🔄 阅读方法</h3><ul><li><strong>主题阅读</strong>：围绕一个主题读多本书</li><li><strong>对比阅读</strong>：不同观点的书籍对照</li><li><strong>深度笔记</strong>：每本书记录核心收获</li><li><strong>实践应用</strong>：将书中智慧应用于生活</li></ul></div></div></section>`;
  }

  if (!html) html = `<div class="empty-state"><div class="empty-state-icon">📚</div><div class="empty-state-text">暂无内容</div></div>`;
  main.innerHTML = html;
}

initNav();
render();
</script>
</body>
</html>
