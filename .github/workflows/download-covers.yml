name: Download Book Covers

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max books to process (0 = all)'
        required: false
        default: '0'

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download covers
      run: python3 scripts/download_covers_v4.py
      env:
        LIMIT: ${{ github.event.inputs.limit }}
    
    - name: Commit & push
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add -A img/covers/ js/data.js
        if git diff --staged --quiet; then
          echo "No changes"
        else
          git commit -m "auto: 批量下载封面 ($(date +%Y-%m-%d))"
          git push
        fi
